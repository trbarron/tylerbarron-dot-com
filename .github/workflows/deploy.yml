name: 🚀 Deploy

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  upload:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        
        - name: ⎔ Setup node
          uses: actions/setup-node@v4
          with:
            node-version: 22
        
        - name: 📥 Install dependencies
          run: npm ci
        
        - name: 📝 Compile MDX files
          run: node scripts/compile-mdx.mjs
        
        - name: Configure AWS
          uses: aws-actions/configure-aws-credentials@v1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: us-east-1

        - name: 📤 Upload compiled posts to S3
          run: |
            aws s3 sync public/compiled-posts/ s3://${{ secrets.AWS_BUCKET_NAME }}/compiled-posts/ --delete

  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package.json

      - name: 📥 Install deps
        run: npm ci

      - name: 🔬 Lint
        run: npm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package.json

      - name: 📥 Install deps
        run: npm ci

      - name: 🔎 Type check
        run: npm run typecheck

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.11.0

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          architecture: x64

      - name: 📥 Install deps
        run: |
          rm -rf node_modules
          npm cache clean --force
          npm ci
          npm i -g @architect/architect
          
      - name: 🏗 Build
        run: |
          npm run build
          mkdir -p public
          cp -r build/client/* public/
        env:
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
          
      - name: 🏗 Build Architect Handler
        run: |
          NODE_ENV=production npx esbuild server.ts --platform=node --target=node22 --format=esm --bundle --minify --outfile=server/index.mjs '--external:@aws-sdk/*' --external:aws-sdk '--external:@react-router/*' --external:react --external:react-dom '--external:./build/*'
          
      - name: 📦 Copy build output to Lambda (excluding images, served from S3/CDN)
        run: |
          mkdir -p server/build/client server/build/server
          cp -r build/server/. server/build/server/
          cp -r build/client/assets server/build/client/
          [ -d build/client/fonts ] && cp -r build/client/fonts server/build/client/ || true
          find build/client -maxdepth 1 -type f -exec cp {} server/build/client/ \;
          echo "Lambda build/client contents:"
          du -sh server/build/client/* 2>/dev/null || true
          echo "Total Lambda build/ size:"
          du -sh server/build
          
      - name: 🔍 Verify public directory
        run: |
          ls -la public/ | head -20
          echo "Asset count:"
          find public/assets -type f | wc -l

      - name: 🚀 Production Deploy
        if: github.ref == 'refs/heads/master'
        run: |
          arc env --add --env production NODE_ENV production || true
          arc deploy --production --prune --verbose --debug
        env:
          CI: true
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GA_TRACKING_ID: ${{ secrets.GA_TRACKING_ID }}
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}