name: 🚀 Deploy

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  upload:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        
        - name: ⎔ Setup node
          uses: actions/setup-node@v4
          with:
            node-version: 22
        
        - name: 📥 Install dependencies
          run: npm ci
        
        - name: 📝 Compile MDX files
          run: node scripts/compile-mdx.mjs
        
        - name: Configure AWS
          uses: aws-actions/configure-aws-credentials@v1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: us-east-1

        - name: 📤 Upload compiled posts to S3
          run: |
            aws s3 sync public/compiled-posts/ s3://${{ secrets.AWS_BUCKET_NAME }}/compiled-posts/ --delete

  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package.json

      - name: 📥 Install deps
        run: npm ci

      - name: 🔬 Lint
        run: npm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package.json

      - name: 📥 Install deps
        run: npm ci

      - name: 🔎 Type check
        run: npm run typecheck

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.11.0

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          architecture: x64

      - name: 📥 Install deps
        run: |
          rm -rf node_modules
          npm cache clean --force
          npm ci
          npm i -g @architect/architect
          
      - name: 🏗 Build
        run: |
          npm run build
          mkdir -p public
          cp -r build/client/* public/
        env:
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
          
      - name: 🏗 Build Architect Handler
        run: |
          NODE_ENV=production npx esbuild server.ts --platform=node --target=node22 --format=esm --bundle --minify --outfile=server/index.mjs '--external:@aws-sdk/*' --external:aws-sdk '--external:@react-router/*' --external:react --external:react-dom '--external:./build/*'
          
      - name: 📤 Upload JS/CSS/font assets to CDN and configure S3 CORS
        if: github.ref == 'refs/heads/master'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: |
          # Enable CORS so <script type=module> can load JS chunks cross-origin
          aws s3api put-bucket-cors --bucket "$AWS_BUCKET_NAME" --cors-configuration \
            '{"CORSRules":[{"AllowedOrigins":["*"],"AllowedMethods":["GET","HEAD"],"AllowedHeaders":[],"MaxAgeSeconds":86400}]}'
          # Content-hashed assets are immutable; sync with --delete to prune stale builds
          aws s3 sync build/client/assets/ "s3://$AWS_BUCKET_NAME/assets/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"
          # Fonts have fixed names so skip --delete and use a shorter TTL
          [ -d build/client/fonts ] && aws s3 sync build/client/fonts/ "s3://$AWS_BUCKET_NAME/fonts/" \
            --cache-control "public,max-age=86400" || true

      - name: 📦 Copy SSR build to Lambda (no client assets — they are on CDN)
        run: |
          mkdir -p server/build
          cp -r build/server server/build/
          echo "=== Lambda bundle size breakdown ==="
          du -sh server/build
          du -sh server/node_modules 2>/dev/null || echo "no node_modules yet"
          du -sh server/index.mjs 2>/dev/null || echo "no index.mjs yet"
          echo "--- total server/ ---"
          du -sh server/
          echo "--- top node_modules by size ---"
          du -sh server/node_modules/*/ 2>/dev/null | sort -rh | head -15

      - name: 🔍 Verify public directory
        run: |
          ls -la public/ | head -20
          echo "Asset count:"
          find public/assets -type f | wc -l || echo "no assets dir"

      - name: 🚀 Production Deploy
        if: github.ref == 'refs/heads/master'
        run: |
          arc env --add --env production NODE_ENV production || true
          arc deploy --production --prune --verbose --debug
        env:
          CI: true
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GA_TRACKING_ID: ${{ secrets.GA_TRACKING_ID }}
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}