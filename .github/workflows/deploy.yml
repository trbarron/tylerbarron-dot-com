name: 🚀 Deploy

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package.json

      - name: 📥 Install deps
        run: npm ci

      - name: 🔬 Lint
        run: npm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package.json

      - name: 📥 Install deps
        run: npm ci

      - name: 🔎 Type check
        run: npm run typecheck

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    # Only master deploys. PRs run lint + typecheck above and stop here, so a PR
    # can never publish assets or overwrite production.
    if: github.ref == 'refs/heads/master'

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          architecture: x64
          cache: npm
          cache-dependency-path: ./package.json

      - name: 📥 Install deps
        run: |
          npm ci
          npm i -g @architect/architect

      # Compile MDX (image src's rewritten to VITE_CDN_URL) -> bundle the compiled
      # posts into the SSR build -> build client assets against the CDN base ->
      # bundle the Lambda handler.
      - name: 🏗 Build
        env:
          NODE_ENV: production
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
        run: |
          npm run compile:mdx
          npm run build
          mkdir -p public
          cp -r build/client/* public/
          npx esbuild server.ts \
            --platform=node --target=node22 --format=esm --bundle --minify \
            --tree-shaking=true --outfile=server/index.mjs \
            '--external:@aws-sdk/*' --external:aws-sdk \
            '--external:@react-router/*' --external:react --external:react-dom \
            '--external:./build/*'

      # The CDN bucket serves everything the browser fetches: hashed JS/CSS,
      # fonts, and blog images. CORS lets <script type=module> load chunks
      # cross-origin.
      - name: 📤 Publish assets + images to CDN
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: |
          aws s3api put-bucket-cors --bucket "$AWS_BUCKET_NAME" --cors-configuration \
            '{"CORSRules":[{"AllowedOrigins":["*"],"AllowedMethods":["GET","HEAD"],"AllowedHeaders":[],"MaxAgeSeconds":86400}]}'
          # Content-hashed assets are immutable; --delete prunes stale builds.
          aws s3 sync build/client/assets/ "s3://$AWS_BUCKET_NAME/assets/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"
          # Fonts have fixed names: skip --delete, shorter TTL.
          [ -d build/client/fonts ] && aws s3 sync build/client/fonts/ "s3://$AWS_BUCKET_NAME/fonts/" \
            --cache-control "public,max-age=86400" || true
          # Blog/post images referenced as /images/* in MDX (rewritten to the CDN).
          aws s3 sync public/images/ "s3://$AWS_BUCKET_NAME/images/" \
            --exclude "*.db" \
            --cache-control "public,max-age=31536000,immutable"

      - name: 📦 Assemble Lambda bundle
        run: |
          mkdir -p server/build
          cp -r build/server server/build/
          cd server && npm install --omit=dev --silent && cd ..
          echo "=== Lambda bundle size breakdown ==="
          du -sh server/build server/node_modules server/index.mjs
          echo "--- total server/ ---"
          du -sh server/
          echo "--- top node_modules by size ---"
          du -sh server/node_modules/*/ | sort -rh | head -15

      - name: 🚀 Production Deploy
        run: |
          arc env --add --env production NODE_ENV production || true
          arc deploy --production --prune --verbose --debug
        env:
          CI: true
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GA_TRACKING_ID: ${{ secrets.GA_TRACKING_ID }}
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
